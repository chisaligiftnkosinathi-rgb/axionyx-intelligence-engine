# AXIONYX Intelligence Engine (AIE)
*An adaptive scientific information architecture for evidence, provenance, replay, and institutional memory.*

## Overview
The AXIONYX Intelligence Engine (AIE) is the core computational foundation for the ChemIS platform. It applies the principles of Scientific Information Architecture (SIA) to establish a verifiable, decentralized, and human-centered truth engine.

## Architecture
See [Architecture](docs/architecture.md) and [Scientific Information Architecture](docs/scientific-information-architecture.md) for deeper details on the philosophical and technical foundations of the engine.

